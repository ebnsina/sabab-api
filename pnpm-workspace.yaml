packages:
  # The SDKs. @sabab/core is the shared base; browser and node build on it.
  # These are not a nice-to-have: our wire format is our own, so an SDK is the
  # only way data can reach us. They ship with M1.
  - "sdk/js/*"
  # The dashboard is a separate repo (github-es:ebnsina/sabab-web), not part
  # of this workspace.
  # Runnable apps we test against — the demo app is the M1 acceptance test.
  - "examples/*"
# esbuild ships a platform-specific binary and needs its postinstall to run.
# It is a build-time dependency of the SDKs only; nothing it does reaches
# production or a customer's bundle.
allowBuilds:
  '@hugeicons/svelte': set this to true or false
  esbuild: true
